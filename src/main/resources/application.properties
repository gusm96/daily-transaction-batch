spring.application.name=dtb

# Spring Batch
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# H2 DataSource (in-memory, Phase 1~2)
spring.datasource.url=jdbc:h2:mem:batchdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA (Phase 1~2: create-drop. Phase 3 진입 전 file 모드 + update 로 변경)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (spring-boot-starter-web 미포함으로 비활성화 -- 필요시 web 의존성 추가)
# spring.h2.console.enabled=true

# Logging
logging.level.org.springframework.batch=INFO
logging.level.org.springframework.transaction=DEBUG
