spring.application.name=dtb

# Spring Batch
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# H2 파일 모드 (Phase 3 — 재시작 메타데이터 영속)
# C-3: 인메모리+create-drop은 앱 종료 시 JobRepository 메타데이터 소실 → 재시작 불가
spring.datasource.url=jdbc:h2:file:./data/batchdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA (Phase 3: update — 앱 재시작 후 스키마 및 메타데이터 유지)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.springframework.batch=INFO
logging.level.org.springframework.transaction=DEBUG
